# SRA CI — 自动化测试 + Lint + 类型检查
# 每个 push/PR 自动运行
name: CI

on:
  push:
    branches: [master, main, feat/v2.0-enforcement-layer]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  test:
    name: 🧪 pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要完整历史用于 setuptools-scm 版本推导

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: 🔍 Verify version (setuptools-scm)
        run: |
          python -c "from skill_advisor import __version__; print(f'Version: {__version__}')"

      - name: 🧪 Run tests
        run: |
          python -m pytest tests/ -q --tb=short -o "addopts="

  lint:
    name: 🧹 Ruff lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check skill_advisor/ tests/

  typecheck:
    name: 🔤 Mypy type check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true  # ⚠️ 逐步引入，当前不 block
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          pip install -e ".[dev]" mypy
      - name: Run mypy
        run: mypy skill_advisor/
