# SRA Release — 自动构建 + PyPI 发布 + GitHub Release
# 触发: git tag v*.*.* 推送时
name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+rc[0-9]+"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: 📦 Build distribution
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 🏷️ Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Release version: $VERSION"
          # 方法1: 直接写 _version.py
          mkdir -p skill_advisor
          echo "# Auto-generated by release workflow" > skill_advisor/_version.py
          echo "version = \"$VERSION\"" >> skill_advisor/_version.py
          echo "Wrote skill_advisor/_version.py → version = \"$VERSION\""
          # 方法2: 设置 setuptools-scm 环境变量作为后备
          echo "SETUPTOOLS_SCM_PRETEND_VERSION=$VERSION" >> "$GITHUB_ENV"
          cat skill_advisor/_version.py

      - name: 🧪 Run tests before build
        run: |
          pip install -e ".[dev]"
          python -m pytest tests/ -q --tb=short -o "addopts="

      - name: 🔨 Build wheel + sdist
        run: |
          pip install build
          # 用静态版本替代 setuptools-scm 动态版本
          VERSION="${GITHUB_REF_NAME#v}"
          python scripts/set_version.py "$VERSION"
          python -m build
          echo "=== Built files ==="
          ls -la dist/

      - name: ⬆️ Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: 🚀 Publish to PyPI
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/sra-agent

    steps:
      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: 🚀 Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: 📝 Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: 📝 Generate release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: 🏷️ Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "v${{ steps.notes.outputs.version }}" \
            --notes "SRA Agent v${{ steps.notes.outputs.version }}" \
            dist/*.tar.gz dist/*.whl
