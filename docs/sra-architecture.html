<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRA — Architecture Diagram</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020617;color:#e2e8f0;font-family:'JetBrains Mono',monospace;display:flex;flex-direction:column;align-items:center;padding:40px 20px}
.header{margin-bottom:30px;text-align:center}
.header h1{font-size:24px;font-weight:700;color:#22d3ee;display:flex;align-items:center;gap:10px;justify-content:center}
.header h1 .dot{width:10px;height:10px;background:#22d3ee;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.header p{font-size:12px;color:#94a3b8;margin-top:8px}
.diagram-card{background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:10px;width:100%;max-width:1100px;overflow-x:auto}
svg{width:100%;height:auto}
</style>
</head>
<body>

<div class="header">
  <h1><span class="dot"></span>SRA Architecture — Pre-Message Skill Reasoning</h1>
  <p>Skill Runtime Advisor: Semantic matching middleware for AI Agent skill discovery</p>
</div>

<div class="diagram-card">
<svg viewBox="0 0 1060 480" xmlns="http://www.w3.org/2000/svg">
<defs>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <marker id="arrowCyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6 Z" fill="#22d3ee"/>
  </marker>
  <marker id="arrowEmerald" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6 Z" fill="#34d399"/>
  </marker>
  <marker id="arrowViolet" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6 Z" fill="#a78bfa"/>
  </marker>
  <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6 Z" fill="#fb923c"/>
  </marker>
</defs>

<!-- Background Grid -->
<rect width="1060" height="480" fill="url(#grid)"/>

<!-- ─── LAYER 0: Arrows (drawn first so they go behind boxes) ─── -->

<!-- User Message → SRA Proxy -->
<path d="M 195 165 L 290 165" fill="none" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrowCyan)"/>
<text x="210" y="155" font-size="8" fill="#94a3b8">POST /recommend</text>

<!-- SRA Proxy → Skill Index (lookup) -->
<path d="M 400 250 L 400 310" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowViolet)"/>
<text x="410" y="285" font-size="7" fill="#a78bfa">lookup</text>

<!-- Skill Index → Skills Dir (scan) -->
<path d="M 320 360 L 195 360" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowOrange)"/>
<text x="230" y="355" font-size="7" fill="#94a3b8">scan SKILL.md</text>

<!-- SRA Proxy → Hermes Agent (rag_context) -->
<path d="M 510 165 L 630 165" fill="none" stroke="#34d399" stroke-width="2" marker-end="url(#arrowEmerald)"/>
<text x="530" y="155" font-size="8" fill="#94a3b8">rag_context + top_skill</text>

<!-- Hermes Agent → Output -->
<path d="M 760 250 L 760 310" fill="none" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrowOrange)"/>
<text x="770" y="285" font-size="7" fill="#fbbf24">response</text>

<!-- ─── LAYER 1: Component Boxes ─── -->

<!-- 1. User (Frontend style) -->
<rect x="30" y="130" rx="6" width="165" height="70" fill="#020617" stroke="#020617" stroke-width="1.5"/>
<rect x="30" y="130" rx="6" width="165" height="70" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
<text x="112" y="158" text-anchor="middle" font-size="12" fill="#22d3ee" font-weight="600">User Message</text>
<text x="112" y="175" text-anchor="middle" font-size="9" fill="#94a3b8">"Draw an architecture diagram"</text>
<text x="112" y="190" text-anchor="middle" font-size="7" fill="#64748b">Natural language input</text>

<!-- 2. SRA Proxy (Backend style) — with internal detail -->
<rect x="290" y="110" rx="6" width="220" height="140" fill="#020617" stroke="#020617" stroke-width="1.5"/>
<rect x="290" y="110" rx="6" width="220" height="140" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
<text x="400" y="133" text-anchor="middle" font-size="12" fill="#34d399" font-weight="600">SRA Proxy :8536</text>
<text x="305" y="152" font-size="8" fill="#34d399">① Tokenize + Synonym Expand</text>
<text x="305" y="166" font-size="8" fill="#34d399">② TF-IDF Scoring</text>
<text x="305" y="180" font-size="8" fill="#34d399">③ Co-occurrence Matrix</text>
<text x="305" y="194" font-size="8" fill="#34d399">④ Score &amp; Rank</text>
<text x="305" y="214" font-size="8" fill="#94a3b8">→ rag_context + top_skill</text>
<text x="305" y="230" font-size="7" fill="#64748b">Latency: &lt; 10ms | Unix Socket + HTTP</text>

<!-- 3. Skill Index Store (Database style) -->
<rect x="310" y="310" rx="6" width="180" height="90" fill="#020617" stroke="#020617" stroke-width="1.5"/>
<rect x="310" y="310" rx="6" width="180" height="90" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
<text x="400" y="338" text-anchor="middle" font-size="12" fill="#a78bfa" font-weight="600">Skill Index Store</text>
<text x="400" y="355" text-anchor="middle" font-size="9" fill="#94a3b8">TF-IDF Matrix</text>
<text x="400" y="370" text-anchor="middle" font-size="9" fill="#94a3b8">Synonym Graph</text>
<text x="400" y="385" text-anchor="middle" font-size="9" fill="#94a3b8">Co-occurrence Map</text>

<!-- 4. Skills Directory -->
<rect x="20" y="320" rx="6" width="170" height="80" fill="#020617" stroke="#020617" stroke-width="1.5"/>
<rect x="20" y="320" rx="6" width="170" height="80" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
<text x="105" y="348" text-anchor="middle" font-size="12" fill="#94a3b8" font-weight="600">~/.hermes/skills/</text>
<text x="105" y="365" text-anchor="middle" font-size="9" fill="#64748b">62 SKILL.md files</text>
<text x="105" y="380" text-anchor="middle" font-size="9" fill="#64748b">Auto-scanned every 1h</text>

<!-- 5. Hermes Agent (Backend style) -->
<rect x="630" y="110" rx="6" width="260" height="140" fill="#020617" stroke="#020617" stroke-width="1.5"/>
<rect x="630" y="110" rx="6" width="260" height="140" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
<text x="760" y="133" text-anchor="middle" font-size="12" fill="#34d399" font-weight="600">Hermes Agent</text>
<text x="645" y="155" font-size="8" fill="#34d399">✓ Inject rag_context into prompt</text>
<text x="645" y="169" font-size="8" fill="#34d399">✓ should_auto_load? → load skill</text>
<text x="645" y="183" font-size="8" fill="#34d399">✓ Execute with enhanced context</text>
<text x="645" y="197" font-size="8" fill="#34d399">✓ Tool calls (terminal, file, web...)</text>
<text x="645" y="217" font-size="7" fill="#64748b">Agent runs normally — SRA is invisible</text>
<text x="645" y="232" font-size="7" fill="#64748b">Works with Claude Code, Codex CLI too</text>

<!-- 6. Output -->
<rect x="640" y="310" rx="6" width="240" height="90" fill="#020617" stroke="#020617" stroke-width="1.5"/>
<rect x="640" y="310" rx="6" width="240" height="90" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
<text x="760" y="338" text-anchor="middle" font-size="12" fill="#fbbf24" font-weight="600">Agent Response</text>
<text x="760" y="358" text-anchor="middle" font-size="9" fill="#94a3b8">"Here's your architecture diagram..."</text>
<text x="760" y="375" text-anchor="middle" font-size="9" fill="#94a3b8">+ correct tools used automatically</text>
<text x="760" y="390" text-anchor="middle" font-size="7" fill="#64748b">via Telegram / Discord / CLI / etc.</text>

<!-- ─── LAYER 2: Zone Labels ─── -->

<!-- SRA Zone bracket -->
<rect x="280" y="95" rx="12" width="240" height="315" fill="none" stroke="#34d399" stroke-width="1" stroke-dasharray="6,4" opacity="0.3"/>
<text x="290" y="108" font-size="7" fill="#34d399" opacity="0.6">SRA Zone</text>

<!-- Agent Zone bracket -->
<rect x="620" y="95" rx="12" width="280" height="315" fill="none" stroke="#34d399" stroke-width="1" stroke-dasharray="6,4" opacity="0.3"/>
<text x="630" y="108" font-size="7" fill="#34d399" opacity="0.6">Agent Zone</text>

<!-- ─── LAYER 3: Legend ─── -->
<rect x="920" y="30" rx="4" width="120" height="120" fill="rgba(30,41,59,0.6)" stroke="#1e293b" stroke-width="1"/>
<text x="930" y="48" font-size="8" fill="#e2e8f0" font-weight="600">Legend</text>
<rect x="930" y="56" width="10" height="10" rx="2" fill="rgba(8,51,68,0.6)" stroke="#22d3ee" stroke-width="1"/>
<text x="946" y="65" font-size="7" fill="#94a3b8">Input</text>
<rect x="930" y="72" width="10" height="10" rx="2" fill="rgba(6,78,59,0.6)" stroke="#34d399" stroke-width="1"/>
<text x="946" y="81" font-size="7" fill="#94a3b8">Middleware</text>
<rect x="930" y="88" width="10" height="10" rx="2" fill="rgba(76,29,149,0.6)" stroke="#a78bfa" stroke-width="1"/>
<text x="946" y="97" font-size="7" fill="#94a3b8">Index Store</text>
<rect x="930" y="104" width="10" height="10" rx="2" fill="rgba(120,53,15,0.5)" stroke="#fbbf24" stroke-width="1"/>
<text x="946" y="113" font-size="7" fill="#94a3b8">Output</text>
<line x1="930" y1="125" x2="950" y2="125" stroke="#34d399" stroke-width="2"/>
<text x="956" y="128" font-size="7" fill="#94a3b8">Request</text>
<line x1="930" y1="138" x2="950" y2="138" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="3,2"/>
<text x="956" y="141" font-size="7" fill="#94a3b8">Lookup</text>

</svg>
</div>

</body>
</html>
